name: Verify Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libgl1-mesa-glx libglib2.0-0

      - name: Install Python Dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Django System Check
        env:
          SUPABASE_DB_HOST: localhost
          SUPABASE_DB_PORT: 5432
          SUPABASE_DB_NAME: postgres
          SUPABASE_DB_USER: postgres
          SUPABASE_DB_PASSWORD: password
          REDIS_URL: redis://localhost:6379/1
          DJANGO_SECRET_KEY: test-secret-key-123
        run: |
          cd backend
          python manage.py check

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend-next
          npm ci

      - name: Run Build Check
        env:
          NEXT_PUBLIC_API_URL: https://biodose-backend-placeholder.railway.app
        run: |
          cd frontend-next
          npm run build
